# Module 14 시나리오용으로 payment-service 의 resources 명확화 + nodeSelector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: order
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-service
    spec:
      serviceAccountName: payment-service
      nodeSelector:
        managed-by: karpenter      # Karpenter 노드만 사용 → 스케일 동시 시연
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/eks-study/payment-service:latest
          ports:
            - {name: metrics, containerPort: 9090}
          env:
            - {name: SQS_QUEUE_URL, value: SQS_URL}
            - {name: AWS_REGION, value: ap-northeast-2}
          readinessProbe:
            httpGet: {path: /healthz, port: metrics}
            periodSeconds: 5
          resources:
            requests: {cpu: 100m, memory: 64Mi}
            limits:   {cpu: 300m, memory: 128Mi}
