# 두 NodePool 분리: spot (우선) + on-demand fallback
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot
spec:
  weight: 100
  template:
    metadata:
      labels:
        managed-by: karpenter
        nodepool: spot
        capacity-type: spot
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [spot]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: [c5, c5a, c6a, c6i, m5, m5a, m6a, m6i, t3, t3a]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4", "8"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: [ap-northeast-2a, ap-northeast-2b, ap-northeast-2c]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      expireAfter: 168h
  limits:
    cpu: "100"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
    budgets:
      - nodes: "20%"      # 한 번에 20% 만 disruption
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ondemand
spec:
  weight: 10
  template:
    metadata:
      labels:
        managed-by: karpenter
        nodepool: ondemand
        capacity-type: on-demand
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: [c5, c6i, m5, m6i, t3]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      expireAfter: 720h     # OD 는 더 오래
  limits:
    cpu: "20"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
