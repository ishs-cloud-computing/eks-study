apiVersion: apps/v1
kind: Deployment
metadata:
  name: inflate
spec:
  replicas: 0
  selector:
    matchLabels: { app: inflate }
  template:
    metadata:
      labels: { app: inflate }
    spec:
      terminationGracePeriodSeconds: 0
      nodeSelector:
        managed-by: karpenter      # 기존 노드 그룹이 아니라 Karpenter 노드로
      containers:
        - name: pause
          image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
          resources:
            requests:
              cpu: 1                # 의도적으로 큰 요청 → 노드 추가 유발
              memory: 1.5Gi
