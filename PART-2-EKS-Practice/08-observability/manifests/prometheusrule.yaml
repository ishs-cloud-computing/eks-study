apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: eks-study-app-rules
  namespace: monitoring
  labels:
    release: kps
spec:
  groups:
    - name: app.rules
      rules:
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace!="kube-system",container!=""}[2m])) by (pod, namespace)
              / sum(container_spec_cpu_quota{container!=""}/100000) by (pod, namespace) > 0.8
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "CPU usage above 80% of limit for 2 minutes"

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 * 5 > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} not ready"
