apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: order
  labels:
    app.kubernetes.io/name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
    spec:
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/eks-study/notification-service:latest
          ports:
            - {name: metrics, containerPort: 9090}
          env:
            # Part 3 모듈 13 에서 in-cluster Kafka 또는 MSK 로 변경
            - {name: KAFKA_BROKERS, value: "kafka.kafka.svc.cluster.local:9092"}
            - {name: KAFKA_TOPIC, value: notifications}
            - {name: KAFKA_GROUP, value: notification-service}
          readinessProbe:
            httpGet: {path: /healthz, port: metrics}
            periodSeconds: 5
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 200m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: order
  labels:
    app.kubernetes.io/name: notification-service
    eks-study/scrape: "true"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: notification-service
  ports:
    - {name: metrics, port: 9090, targetPort: metrics}
