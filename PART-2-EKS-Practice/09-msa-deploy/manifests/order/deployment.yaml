apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: order
  labels:
    app.kubernetes.io/name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
    spec:
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/eks-study/order-service:latest
          ports:
            - {name: http, containerPort: 8080}
            - {name: metrics, containerPort: 9090}
          env:
            - {name: PORT, value: "8080"}
            - {name: LOG_LEVEL, value: info}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits:   {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: order
  labels:
    app.kubernetes.io/name: order-service
    eks-study/scrape: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - {name: http, port: 80, targetPort: http}
    - {name: metrics, port: 9090, targetPort: metrics}
