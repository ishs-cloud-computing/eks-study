apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service
  namespace: order
  annotations:
    # Part 3 에서 IRSA로 SQS 권한 부여 — 본 lab에서는 SQS 호출 안 하므로 placeholder
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/payment-sqs-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: order
  labels:
    app.kubernetes.io/name: payment-service
spec:
  replicas: 1            # Part 3 KEDA 가 0~N으로 자동 스케일
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-service
    spec:
      serviceAccountName: payment-service
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/eks-study/payment-service:latest
          ports:
            - {name: metrics, containerPort: 9090}
          env:
            # SQS_QUEUE_URL 은 Part 3 모듈 13 에서 설정
            - {name: SQS_QUEUE_URL, value: "https://sqs.ap-northeast-2.amazonaws.com/ACCOUNT_ID/payments"}
            - {name: AWS_REGION, value: ap-northeast-2}
          readinessProbe:
            httpGet: {path: /healthz, port: metrics}
            periodSeconds: 5
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 200m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: order
  labels:
    app.kubernetes.io/name: payment-service
    eks-study/scrape: "true"
spec:
  type: ClusterIP
  clusterIP: None        # Headless — Service 외부 노출 불필요, 메트릭만
  selector:
    app.kubernetes.io/name: payment-service
  ports:
    - {name: metrics, port: 9090, targetPort: metrics}
