apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: order
  labels:
    app.kubernetes.io/name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
    spec:
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/eks-study/user-service:latest
          ports:
            - {name: grpc, containerPort: 50051}
            - {name: metrics, containerPort: 9090}
          env:
            - {name: GRPC_PORT, value: "50051"}
          readinessProbe:
            httpGet: {path: /healthz, port: metrics}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: metrics}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits:   {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: order
  labels:
    app.kubernetes.io/name: user-service
    eks-study/scrape: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: user-service
  ports:
    - {name: grpc, port: 50051, targetPort: grpc}
    - {name: metrics, port: 9090, targetPort: metrics}
