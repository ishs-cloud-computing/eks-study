apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: order
  labels:
    app.kubernetes.io/name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/eks-study/frontend:latest
          ports:
            - {name: http, containerPort: 8080}
          env:
            - {name: PORT, value: "8080"}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            periodSeconds: 5
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 200m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: order
  labels:
    app.kubernetes.io/name: frontend
    eks-study/scrape: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - {name: http, port: 80, targetPort: http}
