replicaCount: 2

image:
  repository: ""           # 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/eks-study/order-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  metricsPort: 9090

env:
  PORT: "8080"
  LOG_LEVEL: info

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: order.example.com
  path: /
  pathType: Prefix
